version: '3.9'

services:

  # ── Your Outfit Recommendation API (Service 1) ──
  outfit-api:
    build: ./backend
    container_name: outfit-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Classmate User Profile API (Service 2) ──
  profile-api:
    build: ./classmate-service
    container_name: profile-api
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Frontend (nginx static) ──
  frontend:
    image: nginx:alpine
    container_name: weatherwear-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - outfit-api
      - profile-api
    restart: unless-stopped

networks:
  default:
    name: weatherwear-net
