server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy outfit API (avoid CORS issues in prod)
    location /api/ {
        proxy_pass http://outfit-api:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://outfit-api:5000/health;
    }

    gzip on;
    gzip_types text/html application/json;
}
